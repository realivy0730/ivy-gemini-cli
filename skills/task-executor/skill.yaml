name: task-executor
description: 階段性任務執行框架，將複雜任務拆解為可驗證的小步驟，每步驟執行後立即驗證並記錄。
version: 1.0.0
created: 2026-03-03
updated: 2026-03-03
owner: Ivy

# 核心配置
config:
  # 階段設定
  max_stages: 7
  min_stages: 3
  stage_timeout: 900  # 秒
  
  # 驗證設定
  require_verification: true
  auto_rollback: false
  
  # 記錄設定
  log_commands: true
  log_output: true
  save_backups: true
  
  # 整合設定
  auto_sync_kb: true
  auto_generate_changelog: true
  auto_generate_report: true

# 觸發關鍵字
triggers:
  - "階段性執行"
  - "拆解任務"
  - "逐步執行"
  - "task-executor"

# 整合的 skills
integrations:
  - kb-sync
  - kb-manager
  - validation-report-generator
